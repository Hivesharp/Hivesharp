name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup Node.js (Studio client)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore
        run: dotnet restore Hivesharp.slnx

      - name: Build
        run: dotnet build Hivesharp.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Hivesharp.slnx -c Release --no-build --verbosity normal
